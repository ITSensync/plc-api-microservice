version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: makanminggu12
      MYSQL_DATABASE: modbus-test
      MYSQL_USER: sensync_user
      MYSQL_PASSWORD: makanminggu12
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 5

  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: mosquitto
    ports:
      - "1883:1883"
    restart: unless-stopped

  mqtt-service:
    build: ./mqtt-service
    container_name: mqtt-service
    depends_on:
      - mosquitto
      - db-service
    environment:
      - MQTT_BROKER_URL=mqtt://mosquitto:1883
      - MQTT_TOPIC=plc/#
      - DB_SERVICE_URL=http://db-service:8001

  mqtt-dummy:
    build: ./mqtt-dummy
    container_name: mqtt-dummy
    depends_on:
      - mosquitto
    environment:
      - MQTT_BROKER_URL=mqtt://mosquitto:1883
      - MQTT_TOPIC_PREFIX=plc
      - PLC_ID=plc1
      - PUBLISH_INTERVAL=5000

  db-service:
    build: ./db-service
    container_name: db-service
    ports:
      - "8001:8001"
    depends_on:
      - mysql
    environment:
      - DATABASE_URL=mysql://root:makanminggu12@mysql:3306/modbus-test

  modbus-service:
    build: ./modbus-service
    container_name: modbus-service
    ports:
      - "8000:8000"
    depends_on:
      - db-service
    environment:
      - DB_SERVICE_URL=http://db-service:8001
      - POLL_INTERVAL=5

volumes:
  mysql_data:
